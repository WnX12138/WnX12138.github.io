<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>火影大王 | 吃货の个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 背景图 */
        body {
            background-image: url('背景.jpg');
            background-size: cover;
            background-position: center 30%;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
        }

        /* 轻微遮罩，保持文字可读但不完全挡住背景 */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.25);  /* 降低不透明度，让背景更明显 */
            backdrop-filter: blur(1px);
            z-index: 0;
            pointer-events: none;
        }

        /* 卡片 - 更透明，不挡背景人物 */
        .card {
            max-width: 650px;
            width: 100%;
            background: rgba(255, 248, 235, 0.75);  /* 更透明 */
            backdrop-filter: blur(6px);
            border-radius: 2.5rem;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.3);
            padding: 1.8rem 2rem 2rem;
            transition: all 0.25s ease;
            border: 1px solid rgba(255, 200, 120, 0.6);
            position: relative;
            z-index: 2;
        }

        /* 可选：让卡片位置偏移，比如左下角 */
        /* 取消下面注释可以把卡片移到左下角 */
        /*
        body {
            justify-content: flex-start;
            align-items: flex-end;
        }
        */

        .avatar-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 0.8rem;
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.3);
            border: 3px solid #ffaa55;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 0%;
            display: block;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(130deg, #d35400, #f39c12);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .ninja-slogan {
            text-align: center;
            font-size: 1rem;
            font-weight: bold;
            background: rgba(255, 240, 219, 0.9);
            display: inline-block;
            width: auto;
            margin: 0 auto 0.6rem;
            padding: 0.25rem 1rem;
            border-radius: 50px;
            color: #c0392b;
        }

        .badge-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
            margin: 0.8rem 0;
        }

        .badge {
            background: rgba(253, 235, 208, 0.9);
            padding: 0.3rem 0.9rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #b64926;
        }

        .intro {
            text-align: center;
            margin: 0.8rem 0;
            font-size: 1rem;
            color: #3a2a1a;
        }

        .food-quote {
            background: rgba(255, 242, 224, 0.9);
            border-radius: 1.5rem;
            padding: 0.7rem 1rem;
            margin: 1rem 0;
            text-align: center;
            font-weight: 700;
            font-size: 1rem;
            color: #c03b1a;
            border: 2px dashed #ffaa66;
        }

        hr {
            margin: 1rem 0;
            border: none;
            height: 2px;
            background: linear-gradient(to right, #ffc084, #ff8c42, #ffc084);
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .link-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 247, 239, 0.9);
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            text-decoration: none;
            color: #4a2a12;
            font-weight: 600;
            border: 1px solid #ffd6ae;
            transition: 0.2s;
        }

        .link-item:hover {
            background: #ffffff;
            transform: translateX(5px);
        }

        .link-icon {
            font-size: 1.4rem;
            width: 32px;
            text-align: center;
        }

        .game-link {
            background: linear-gradient(105deg, #2c1a0c, #4a2a18);
            color: #ffdd99;
        }

        .footer-note {
            text-align: center;
            font-size: 0.7rem;
            color: #8a5a30;
            margin-top: 1.2rem;
            padding-top: 0.5rem;
            border-top: 1px solid #ffd6ae;
        }

        @media (max-width: 520px) {
            .card {
                padding: 1.2rem;
            }
            .avatar {
                width: 85px;
                height: 85px;
            }
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar-wrapper">
            <div class="avatar">
                <img src="头像.jpg" alt="火影大王头像">
            </div>
        </div>

        <h1>🔥 火影大王 🔥</h1>
        <div style="display: flex; justify-content: center;">
            <div class="ninja-slogan">
                ⚡ 随便找我单挑 · 一乐拉面先干三碗 ⚡
            </div>
        </div>

        <div class="badge-group">
            <span class="badge">🍥 木叶飞舞之处</span>
            <span class="badge">🍜 一乐拉面VIP</span>
            <span class="badge">⚡ 吃饱才有力气减肥</span>
            <span class="badge">🥋 吃货影分身</span>
        </div>

        <div class="intro">
            <p>✨ 开心才是最强忍术 ✨</p>
            <p>没有什么事是一顿火锅/拉面解决不了的！</p>
        </div>

        <div class="food-quote">
            🍣🍤🍱 “吃饱了才有力气减肥” 🍡🍧🍺
        </div>

        <hr>

        <div class="links">
            <a href="mailto:huoyingdawang@example.com" class="link-item">
                <span class="link-icon">📧</span>
                <span>huoyingdawang@example.com</span>
            </a>
            <a href="https://github.com/huoyingdawang" target="_blank" class="link-item">
                <span class="link-icon">🐙</span>
                <span>GitHub · 火影代码库</span>
            </a>
            <a href="snake.html" target="_blank" class="link-item game-link">
                <span class="link-icon">🐍🎮</span>
                <span>🔥 玩贪吃蛇 · 影级挑战 🔥</span>
            </a>
        </div>

        <div class="footer-note">
            💥 随时接受挑战，忍界大吃货，不服来辩！💥<br>
            🍜 一乐拉面管够 🍥
        </div>
    </div>
</body>
</html>
